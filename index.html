<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="left">
            <img src="washing-machine-cartoon-icon-illustration-object-technology-icon-concept-isolated-premium-flat-cartoon-style-vector-removebg-preview.png" alt="Washing Machine">
        </div>

        <div class="right">
            <div class="form-wrapper">
                <div class="right-1st">
                    <h1>Hello Again!</h1>
                    <p>Welcome Back! We missed you</p>
                </div>
                
                <form>
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Email@site.com">
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Password">
                    </div>

                    <div class="form-actions">
                        <a href="#" class="forgot-password">Forgot Password</a>
                    </div>

                    <button type="submit" class="login-btn">Login</button>
                </form>

                <p class="register-text">Not a member? <a href="#">Register Now</a></p>
            </div>
        </div>
    </div>
</body>
</html>
